<nav class="navbar navbar-expand bg-white border-bottom shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-primary" routerLink="/home">Mini ERP</a>
    <ul class="navbar-nav me-auto">
      <li class="nav-item"><a class="nav-link" routerLink="/home">Accueil</a></li>
      <li class="nav-item"><a class="nav-link" routerLink="/home">Produits</a></li>
      <li class="nav-item"><a class="nav-link" routerLink="/favorites">Favoris</a></li>
    </ul>
    <ul class="navbar-nav ms-auto align-items-center gap-3">
      <li class="nav-item">
        <a class="nav-link position-relative p-2" routerLink="/favorites" title="Favoris">
          <i class="bi bi-heart-fill fs-5 text-danger"></i>
          <span *ngIf="favCount > 0" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-white shadow-sm" style="font-size: 0.65rem;">
            {{ favCount }}
          </span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link position-relative p-2" routerLink="/cart" title="Panier">
          <i class="bi bi-cart3 fs-5 text-primary"></i>
          <span *ngIf="cartCount > 0" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-primary border border-white shadow-sm" style="font-size: 0.65rem;">
            {{ cartCount }}
          </span>
        </a>
      </li>
      <ng-container *ngIf="!isLoggedIn; else userMenu">
        <li class="nav-item ms-2"><a class="btn btn-outline-primary btn-sm rounded-pill px-3" routerLink="/login">Login</a></li>
        <li class="nav-item ms-2"><a class="btn btn-primary btn-sm rounded-pill px-3 shadow-sm" routerLink="/register">Register</a></li>
      </ng-container>
      
      <ng-template #userMenu>
        <li class="nav-item dropdown ms-3">
          <a class="nav-link dropdown-toggle d-flex align-items-center p-1 rounded-pill" href="#" id="profileMenu" role="button" data-bs-toggle="dropdown">
            <img src="https://ui-avatars.com/api/?name={{username}}&background=0D6EFD&color=fff&bold=true" class="rounded-circle me-2" width="32" height="32" />
            <span class="fw-semibold small d-none d-lg-inline">{{username}}</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
            <li *ngIf="isAdmin"><a class="dropdown-item py-2" routerLink="/dashboard"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li><a class="dropdown-item py-2" href="#"><i class="bi bi-person me-2"></i>Profil</a></li>
            <li><hr class="dropdown-divider opacity-10" /></li>
            <li><a class="dropdown-item py-2 text-danger" href="javascript:void(0)" (click)="logout()"><i class="bi bi-box-arrow-right me-2"></i>Déconnexion</a></li>
          </ul>
        </li>
      </ng-template>
    </ul>
  </div>
  </nav>
<main class="container-fluid py-3">
  <router-outlet />
</main>
