<div class="container-fluid">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="mb-0">Boutique</h2>
  </div>
  <div class="row g-3">
    <div class="col-12 col-sm-6 col-md-4 col-lg-3" *ngFor="let p of products">
      <div class="card product-card shadow-sm">
        <div class="position-relative">
          <img [src]="imageSrc(p)" class="card-img-top" [alt]="p.nom" />
          <button type="button" class="btn btn-light btn-sm position-absolute top-0 end-0 m-2 rounded-circle" (click)="onFavorite(p)">
            <i class="bi" [ngClass]="isFav(p.id) ? 'bi-heart-fill text-danger' : 'bi-heart'"></i>
          </button>
        </div>
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <h6 class="card-title mb-0">{{ p.nom }}</h6>
            <span class="badge" [ngClass]="p.quantiteDisponible ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'">
              {{ p.quantiteDisponible || 0 }} en stock
            </span>
          </div>
          <div class="d-flex justify-content-between align-items-center">
            <div class="fw-semibold fs-5 text-primary">{{ p.prix | number:'1.0-2' }} TND</div>
            <button class="btn btn-sm btn-outline-primary" (click)="add(p)" [disabled]="(p.quantiteDisponible || 0) <= 0">
              <i class="bi bi-cart-plus"></i> Ajouter
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
