<div class="container-fluid">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="mb-0">Panier</h2>
    <button class="btn btn-outline-danger" (click)="clear()">Vider</button>
  </div>
  <div class="card card-elevated p-3">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr><th>Produit</th><th>Prix</th><th style="width:140px">Qté</th><th>Total</th><th></th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let i of items">
            <td class="d-flex align-items-center">
              <img src="https://picsum.photos/seed/{{i.product.id || i.product.nom}}/64/64" class="rounded me-2" />
              <div>
                <div class="fw-semibold">{{ i.product.nom }}</div>
                <small class="text-muted" *ngIf="i.product.quantiteDisponible > 0">
                  {{ i.product.quantiteDisponible }} restants en stock
                </small>
                <small class="text-danger" *ngIf="i.product.quantiteDisponible <= 0">
                  Plus de stock disponible
                </small>
              </div>
            </td>
            <td>{{ i.product.prix | number:'1.0-2' }} TND</td>
            <td class="text-nowrap">
              <div class="input-group" style="max-width: 160px">
                <button class="btn btn-outline-secondary" type="button" (click)="dec(i.product.id!, i.qty)">-</button>
                <input type="number" class="form-control text-center" min="1" [ngModel]="i.qty" (ngModelChange)="update(i.product.id!, $event)" />
                <button class="btn btn-outline-secondary" type="button" (click)="inc(i.product.id!, i.qty)">+</button>
              </div>
            </td>
            <td>{{ (i.product.prix || 0) * i.qty | number:'1.0-2' }} TND</td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-danger" (click)="remove(i.product.id!)"><i class="bi bi-trash"></i></button>
            </td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <th colspan="3" class="text-end">Total</th>
            <th>{{ total() | number:'1.0-2' }} TND</th>
            <th></th>
          </tr>
        </tfoot>
      </table>
    </div>
    <div class="text-end">
      <button class="btn btn-success px-4 py-2 fw-semibold shadow-sm" (click)="onOrder()" [disabled]="items.length === 0 || loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        {{ loading ? 'Traitement...' : 'Commander' }}
      </button>
    </div>
  </div>
</div>
