<div class="container-fluid">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="mb-0">Commandes</h2>
    <div class="input-group" style="max-width:420px">
      <label class="input-group-text">Client</label>
      <select class="form-select" [(ngModel)]="selectedCustomerId">
        <option [ngValue]="null">-- sélectionner --</option>
        <option *ngFor="let c of customers" [ngValue]="c.id">{{ c.nom }}</option>
      </select>
      <button class="btn btn-primary" (click)="createOrder()">Créer</button>
    </div>
  </div>
  <div class="card card-elevated">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr><th>ID</th><th>Client</th><th>Status</th><th>Total</th><th class="text-end">Actions</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let o of orders">
            <td>{{ o.id }}</td>
            <td>{{ o.customer.nom }}</td>
            <td>
              <span class="badge me-2" [ngClass]="{
                'bg-warning-subtle text-warning': o.status === 'EN_COURS',
                'bg-info-subtle text-info': o.status === 'VALIDEE',
                'bg-success-subtle text-success': o.status === 'LIVREE'
              }">{{ o.status }}</span>
              <select class="form-select form-select-sm d-inline-block w-auto" [(ngModel)]="o.status" (change)="updateStatus(o)">
                <option value="EN_COURS">En cours</option>
                <option value="VALIDEE">Validée</option>
                <option value="LIVREE">Livrée</option>
              </select>
            </td>
            <td>{{ o.totalMontant || 0 }}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-danger" (click)="deleteOrder(o.id!)"><i class="bi bi-trash"></i></button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="card card-elevated p-3 mt-3">
    <h5>Ajouter un produit à une commande</h5>
    <div class="row g-2 align-items-end">
      <div class="col-12 col-md-3">
        <label class="form-label">Commande</label>
        <select class="form-select" [(ngModel)]="selectedOrderId">
          <option [ngValue]="null">-- sélectionner --</option>
          <option *ngFor="let o of orders" [ngValue]="o.id">#{{ o.id }}</option>
        </select>
      </div>
      <div class="col-12 col-md-3">
        <label class="form-label">Produit</label>
        <select class="form-select" [(ngModel)]="selectedProductId">
          <option [ngValue]="null">-- sélectionner --</option>
          <option *ngFor="let p of products" [ngValue]="p.id">{{ p.nom }}</option>
        </select>
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">Quantité</label>
        <input class="form-control" type="number" [(ngModel)]="quantity" />
      </div>
      <div class="col-12 col-md-2">
        <button class="btn btn-outline-primary w-100" (click)="addItem()">Ajouter</button>
      </div>
    </div>
  </div>
</div>
